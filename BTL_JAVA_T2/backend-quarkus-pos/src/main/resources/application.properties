# ==========================================
# Quarkus POS Backend - Application Config
# ==========================================

# HTTP Port
quarkus.http.port=8081
quarkus.http.test-port=8082

# Disable Dev Services (we use our own PostgreSQL)
quarkus.datasource.devservices.enabled=false

# ==========================================
# Database (PostgreSQL)
# ==========================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5455/coffeeshop_db
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres

# ==========================================
# Hibernate ORM
# ==========================================
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

# ==========================================
# Flyway (disabled - using hibernate DDL)
# ==========================================
quarkus.flyway.enabled=false

# ==========================================
# CORS
# ==========================================
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5174,http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=Content-Type,Authorization,X-Requested-With
quarkus.http.cors.exposed-headers=Location,Info
quarkus.http.cors.access-control-allow-credentials=true

# ==========================================
# Multipart
# ==========================================
quarkus.http.limits.max-body-size=10M

# ==========================================
# SmallRye JWT (placeholder - to be configured)
